name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject secrets (Google Search Console + GA4)
        run: |
          sed -i "s/GOOGLE_SITE_VERIFICATION_PLACEHOLDER/${{ secrets.GOOGLE_SITE_VERIFICATION }}/g" index.html
          sed -i "s/GA_MEASUREMENT_ID_PLACEHOLDER/${{ secrets.GA_MEASUREMENT_ID }}/g" index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
