<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TonalExtractor Direct Test</title>
  <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.web.js"></script>
</head>
<body>
<pre id="output">Loading...</pre>
<script>
async function main() {
  const log = (msg) => {
    const el = document.getElementById('output');
    el.textContent += '\n' + msg;
    console.log(msg);
  };

  try {
    log('Loading essentia.js WASM...');
    const EssentiaConstructor = globalThis.Essentia;
    const wasmFactory = globalThis.EssentiaWASM;
    if (!EssentiaConstructor || !wasmFactory) {
      log('ERROR: Essentia.js not loaded');
      return;
    }
    const wasmModule = await wasmFactory();
    const essentia = new EssentiaConstructor(wasmModule);
    log('Essentia loaded.');

    // Load test WAV
    log('Fetching test WAV...');
    const resp = await fetch('c_major_chord.wav');
    const arrayBuf = await resp.arrayBuffer();
    const audioCtx = new OfflineAudioContext(1, 44100 * 3, 44100);
    const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
    const channelData = audioBuf.getChannelData(0);
    log('Audio loaded: ' + channelData.length + ' samples');

    const vector = essentia.arrayToVector(channelData);
    log('Calling TonalExtractor...');
    const result = essentia.TonalExtractor(vector);
    log('TonalExtractor returned.');

    log('=== FULL RESULT KEYS ===');
    Object.keys(result).forEach(k => {
      const val = result[k];
      log(k + ': ' + (typeof val) + ' = ' + JSON.stringify(val).slice(0, 200));
    });

    log('=== CHORDS ANALYSIS ===');
    log('chords_progression: ' + JSON.stringify(result.chords_progression));
    log('chords_progression type: ' + typeof result.chords_progression);
    log('chords_strength: ' + JSON.stringify(result.chords_strength));
    log('chords_key: ' + JSON.stringify(result.chords_key));
    log('chords_scale: ' + JSON.stringify(result.chords_scale));
    log('key_key: ' + JSON.stringify(result.key_key));
    log('key_scale: ' + JSON.stringify(result.key_scale));
    log('key_strength: ' + JSON.stringify(result.key_strength));

    if (Array.isArray(result.chords_progression)) {
      log('chords_progression IS array, length=' + result.chords_progression.length);
    } else if (typeof result.chords_progression === 'object') {
      log('chords_progression IS object with keys: ' + Object.keys(result.chords_progression).join(','));
    }

    log('=== KEYEXTRACTOR (comparison) ===');
    const keyVec = essentia.arrayToVector(channelData);
    const keyResult = essentia.KeyExtractor(keyVec);
    log('key: ' + keyResult.key + ', scale: ' + keyResult.scale + ', strength: ' + keyResult.strength);

    essentia.delete();
    log('=== DONE ===');
  } catch(e) {
    log('ERROR: ' + e.message + '\n' + e.stack);
  }
}

main();
</script>
</body>
</html>
